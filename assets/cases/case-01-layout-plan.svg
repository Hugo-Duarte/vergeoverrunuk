<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 750" role="img" aria-labelledby="title desc">
  <title id="title">Layout plan evidence placeholder</title>
  <desc id="desc">A stylised placeholder for an estate layout plan, council letter or legal document extract.</desc>
  <rect width="1200" height="750" fill="#10191d"/>
  <rect x="140" y="75" width="920" height="600" rx="28" fill="#eef7f8"/>
  <path d="M245 520 C390 400 505 390 610 260 C720 125 855 170 970 130" fill="none" stroke="#1f3036" stroke-width="58" stroke-linecap="round"/>
  <path d="M240 525 C390 405 505 395 610 265 C720 130 855 175 970 135" fill="none" stroke="#ff4500" stroke-width="9" stroke-dasharray="24 20" stroke-linecap="round"/>
  <g fill="#78a658" stroke="#31512f" stroke-width="7">
    <rect x="260" y="140" width="110" height="85" rx="8"/>
    <rect x="422" y="230" width="112" height="88" rx="8"/>
    <rect x="710" y="330" width="118" height="95" rx="8"/>
    <rect x="860" y="468" width="122" height="98" rx="8"/>
  </g>
  <g fill="#10191d" font-family="Arial, sans-serif" text-anchor="middle">
